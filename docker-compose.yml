version: '3.8'
services:
  trading-engine:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./workspace/logs:/app/workspace/logs
      - ./workspace/data:/app/workspace/data
    healthcheck:
      test: ["CMD", "python3", "scripts/trading_engine.py", "--status"]
      interval: 60s
      timeout: 10s
      retries: 3
