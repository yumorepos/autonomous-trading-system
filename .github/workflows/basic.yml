name: safe-verification

on:
  push:
  pull_request:

jobs:
  verify:
    name: Safe paper-trading verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show verification scope
        run: |
          echo 'Running CI-safe verification for the paper-trading repository.'
          echo 'This workflow intentionally excludes blocking network-dependent checks.'
          echo 'Live trading is not implemented and is not part of verification.'

      - name: Run safe verification suite
        run: ./scripts/ci-safe-verification.sh
